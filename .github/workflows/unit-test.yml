name: 'Unit Test'

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        version: [ "3.11", "3.12", "3.13" ]
    steps:
      - uses: actions/checkout@v6
      - name: Install uv and set the Python version 3.11
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.version }}
      - name: Install dependencies
        run: uv sync --locked --all-extras --dev
      - name: Lint with flake8
        run: |
          # stop the build if there are Python syntax errors or undefined names
          uv run flake8 . --exclude .venv,tests  --count --select=E9,F63,F7,F82 --show-source --statistics
          # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
          uv run flake8 . --exclude .venv,tests --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
      - name: Test with pytest
        run: uv run pytest tests
      - name: Build package
        run: uv build
      - name: Smoke test (wheel)
        run: uv run --isolated --no-project  --with pytest --with dist/*.whl tests/smoke_test.py
      - name: Smoke test (source distribution)
        run: uv run --isolated --no-project  --with pytest --with dist/*.tar.gz tests/smoke_test.py